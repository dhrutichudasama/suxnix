<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suxnix - Power Supplement</title>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    screens: {
                        'desk': '1020px',
                    },
                    fontFamily: {
                        sans: ['Inter', 'Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0ca85d',
                        secondary: '#f89a20',
                        textGray: '#666a71',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../assets/style/style.css">
</head>

<body>
    <div id="header"></div>
    <!-- Hero Banner Section -->
    <section
        class="relative w-full h-[700px] md:h-[700px] flex items-center justify-center overflow-hidden pt-12 md:pt-20">
        <!-- Background Image -->
        <img src="../assets/images/poster_img.jpg" class="absolute inset-0 w-full h-full object-cover">

        <!-- Dark Overlay -->
        <div class="absolute inset-0 bg-black/75"></div>

        <!-- Content -->
        <div class="relative z-10 text-center text-white mt-12 md:mt-16">
            <h1 class="text-4xl md:text-6xl font-bold uppercase mb-4 tracking-[-0.02em] font-sans">LOGIN</h1>
            <p class="text-sm md:text-[15px] font-semibold tracking-wide">
                <a href="../index.html" class="text-white hover:text-primary transition-colors duration-300">Home</a>
                <span class="mx-2 text-white/50">|</span>
                <span class="text-primary">Login</span>
            </p>
        </div>

        <!-- Decorative Bottom Edge -->
        <div class="absolute -bottom-[1px] left-0 w-full z-20 leading-[0]">
            <img src="../assets/images/white_bottom_edge.webp" class="w-full object-cover" alt="Edge">
        </div>
    </section>

    <!-- Login Section -->
    <section class="py-16 md:py-24 font-sans bg-white flex justify-center">
        <div
            class="w-full max-w-[500px] bg-[#f8f8f8] p-8 md:p-12 rounded border border-gray-100 shadow-[0_5px_40px_rgba(0,0,0,0.03)] text-[#202427] text-center">

            <h2 class="text-[28px] md:text-[32px] font-bold uppercase tracking-tight mb-4">WELCOME BACK!</h2>

            <p class="text-[14px] md:text-[15px] text-gray-500 mb-8 leading-relaxed">
                Hey there! Ready to log in? Just enter your username and password below and you'll be back in action in
                no time. Let's go!
            </p>

            <!-- Shop App Login Button -->
            <button
                class="w-full md:w-[60%] mx-auto h-[48px] bg-[#5A31F4] hover:bg-[#4a26cc] text-white rounded font-bold text-[15px] tracking-wide transition-colors flex justify-center items-center mb-2">
                Sign in with <span class="font-extrabold ml-1">shop</span>
            </button>

            <!-- Translation Missing Text -->
            <p class="text-[13px] text-gray-500 mb-8 text-left max-w-[80%] mx-auto lg:max-w-none">
                Translation missing: en.customer.login_page.alternate_provider_separator
            </p>

            <!-- Form -->
            <form>
                <div class="mb-4 text-left">
                    <label class="block text-[15px] font-bold text-[#202427] mb-2">Email</label>
                    <input type="email" placeholder="Email"
                        class="w-full h-[50px] px-4 rounded border-none focus:ring-1 focus:ring-[#0E9D4D] focus:outline-none shadow-sm text-[15px] text-gray-600 bg-white">
                </div>

                <div class="mb-5 text-left">
                    <label class="block text-[15px] font-bold text-[#202427] mb-2">Password</label>
                    <input type="password" placeholder="Password"
                        class="w-full h-[50px] px-4 rounded border-none focus:ring-1 focus:ring-[#0E9D4D] focus:outline-none shadow-sm text-[15px] text-gray-600 bg-white">
                </div>

                <div class="flex items-center justify-between mb-8">
                    <label class="flex items-center gap-2 cursor-pointer text-[14px] text-[#202427]">
                        <input type="checkbox"
                            class="w-4 h-4 rounded border-gray-300 text-[#0E9D4D] focus:ring-[#0E9D4D]">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="text-[14px] text-[#f89a20] hover:text-[#0E9D4D] transition-colors">Forgot
                        Password?</a>
                </div>

                <button type="button"
                    class="relative overflow-hidden w-full h-[50px] bg-[#0E9D4D] text-white rounded-full font-bold text-[16px] tracking-wide mb-8 group">
                    <span class="relative z-10">Sign In</span>

                    <!-- Water Layer -->
                    <span
                        class="absolute left-0 bottom-0 w-full h-0 bg-orange-500 transition-all duration-500 ease-in-out group-hover:h-full z-0"></span>
                </button>

                <div class="text-[14px] text-gray-500">
                    Don't have an account? <a href="register.html"
                        class="text-[#f89a20] hover:text-[#0E9D4D] transition-colors underline-offset-4 hover:underline">Sign
                        Up</a>
                </div>
            </form>
        </div>
    </section>

    <!-- Back to Top Button -->
    <button id="backToTopBtn" class="fixed bottom-8 right-8 w-14 h-14 rounded-full bg-[#0E9D4D] text-white 
         flex items-center justify-center shadow-[0_15px_25px_rgba(0,0,0,0.5)] hover:bg-[#0a864a] hover:-translate-y-1 
         transition-all duration-300 opacity-0 invisible z-50">

        <!-- Arrow Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" />
        </svg>
    </button>

    <div id="footer"></div>

    <script src="../assets/script/include.js"></script>
    <script src="../assets/script/script.js"></script>
    <script>
        initIncludes("..");
    </script>
</body>

</html>
